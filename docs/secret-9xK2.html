  <style>
  body { 
    font-family: 'Arial', sans-serif; 
    margin: 0;
    overflow: hidden; /* Prevents the whole page from bouncing */
    width: 100%;
    height: 100vh;
  }

  #FamilyChart {
    width: 100%;
    height: 100vh;
    background-color: rgb(33, 33, 33);
    color: #fff;
    /* Allow the library to handle all touch logic */
    touch-action: none; 
    -webkit-user-select: none;
    user-select: none;
  }
/* THIS FIXED THE PROBLEM ================={ */
 .f3-form-cont:not(.opened) {
  display: none !important;
}

.f3-form-cont.opened {
  display: block !important;
  width: min(80vw, 340px) !important;
  max-width: 340px !important;

  transform: translateX(0);
  transition: transform 0.3s ease;
}

/* }=================== */
  .f3-edit-tree {
    max-width: 340px !important;
    width: 85vw !important;
    /* Ensure the sidebar doesn't block touch events when hidden */
    transition: transform 0.3s ease, opacity 0.3s ease !important;
    z-index: 1000;
  }

  /* Fix for the sidebar blocking interaction */
  .f3-edit-tree.hidden {
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }

</style>

<div id="FamilyChart" class="f3" style="width:100%;height:900px;margin:auto;background-color:rgb(33,33,33);color:#fff;"></div>
<script type="module">

const isMobile = window.innerWidth <= 768;

create(data())
let chartInstance;
function create(data) {
  // if (chartInstance) return; // prevent double init

  const f3Chart = f3.createChart('#FamilyChart', data)
    .setTransitionTime(1000)
    .setCardXSpacing(250)
    .setCardYSpacing(150)
    .setSingleParentEmptyCard(true, {label: 'ADD'})
    .setShowSiblingsOfMain(false)
    .setOrientationVertical()

  const f3Card = f3Chart.setCardHtml()
    .setCardDisplay([["first name","last name"],["birthday"]])
    .setCardDim(null)
    .setMiniTree(true)
    .setStyle('imageRect')
    .setOnHoverPathToMain()

  
  const f3EditTree = f3Chart.editTree()
    .fixed(false)
    .setFields(["first name","last name","birthday","avatar"])
    .setEditFirst(false)
    .setCardClickOpen(f3Card)
  
  f3EditTree.setNoEdit()

  if(!isMobile) {
    f3EditTree.open(f3Chart.getMainDatum())
  }

  const container = document.querySelector('#FamilyChart');
  const editTreeEl = document.querySelector('.f3-edit-tree');

  function syncChartInteraction() {
    const isEditOpen = editTreeEl && !editTreeEl.classList.contains('hidden');
    container.style.pointerEvents = isEditOpen ? 'none' : 'all';
  }

  container.addEventListener('touchstart', () => {
    const isEditOpen = editTreeEl && !editTreeEl.classList.contains('hidden');
    container.style.pointerEvents = isEditOpen ? 'none' : 'all';
  }, { passive: true });

  if (editTreeEl) {
    const observer = new MutationObserver(() => {
      syncChartInteraction();
      if (editTreeEl.classList.contains('hidden')) {
        f3Chart.updateTree({ initial: false });
      }
    });
    observer.observe(editTreeEl, { attributes: true, attributeFilter: ['class'] });
  }

  syncChartInteraction();
  f3Chart.updateTree({initial: true})
}
