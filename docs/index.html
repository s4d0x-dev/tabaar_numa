<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
      <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ورود به سیستم | تبار نما</title>

        <style>
            body {
                margin: 0;
                font-family: 'Tahoma', sans-serif;
                background: linear-gradient(135deg, #1e1e2f, #2c3e50);
                color: #fff;

                display: flex;
                justify-content: center;
                align-items: center;

                min-height: 100vh;   
                padding: 20px;       
                direction: rtl;
            }

            .auth-box {
                background: rgba(255,255,255,0.05);
                backdrop-filter: blur(10px);

                padding: 30px; 
                border-radius: 15px;

                text-align: center;
                box-shadow: 0 0 25px rgba(0,0,0,0.5);

                max-width: 320px;
                width: 100%;

                animation: fadeIn 1.2s ease;
            }

            .auth-box input {
                width: 100%;
                box-sizing: border-box; 

                padding: 12px;
                border: none;
                border-radius: 8px;

                margin-bottom: 15px;
                outline: none;

                font-size: 14px;
            }

            .auth-box button {
                width: 100%;
                padding: 12px;

                border: none;
                border-radius: 8px;

                background: #00adb5;
                color: white;

                cursor: pointer;
                font-size: 16px;

                transition: 0.3s;
            }

            /* Touch feedback */
            .auth-box button:active {
                background: #008c94;
                transform: scale(0.98);
            }

            .error {
                color: #ff4d4d;
                font-size: 13px;
                display: none;
                margin-top: 10px;
            }

            /* REAL mobile optimization */
            /* @media (max-width: 480px) {
                .auth-box {
                    padding: 20px;
                    border-radius: 12px;
                }

                .auth-box h1 {
                    font-size: 20px;
                }

                .auth-box h2 {
                    font-size: 16px;
                }
            } */

            @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .error.show {
            display: block;
            animation: shake 0.3s;
        }
        </style>
</head>

<body>

<div class="auth-box">
    <h1 style="color:#00adb5;">تبار نما</h1> <br> <hr>
    <h2> ورود به سامانه</h2>

    <input type="text" id="user" placeholder="نام کاربری..." />

    <input type="password" id="pass" placeholder="گذرواژه را وارد کنید..." />
    <button onclick="checkPass()">ورود</button>

    <div class="error" id="err">نام کاربری یا گذرواژه نادرست!</div>
</div>

<script>
    document.getElementById("user").focus();
    function checkPass() {
        const USR = "u";
        const PWD = "p";

        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;
        const err = document.getElementById("err");

        if (user === USR && pass === PWD) {
            sessionStorage.setItem("auth", "ok");
            window.location.href = "secret-9xK2.html"; // <-- [CHANGE] Secret page here.
        } else {
            err.classList.add("show");
        }

        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    }

    document.getElementById("user").oninput =
    document.getElementById("pass").oninput = () => {
        document.getElementById("err").classList.remove("show");
    };

    document.addEventListener("keypress", function(e){
        if(e.key === "Enter") checkPass();
    });

</script>

</body>
</html>
